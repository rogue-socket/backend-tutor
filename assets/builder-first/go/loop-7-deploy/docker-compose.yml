# Loop 7 — full stack: server + worker + Postgres + Redis.
#
# Run:
#   docker compose up --build
# In another terminal:
#   curl http://localhost:8080/healthz

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: links
    ports: ["5432:5432"]
    volumes: ["dbdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d links"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  server:
    build: .
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment:
      DATABASE_URL: postgres://app:app@db:5432/links?sslmode=disable
      REDIS_ADDR: redis:6379
      LOG_LEVEL: info
    ports: ["8080:8080"]
    healthcheck:
      test: ["CMD", "/server", "-healthcheck"]   # implement -healthcheck flag, OR
      # use a wget/curl-based check (NOTE: distroless has no shell — use a small
      # Go binary or change base image to alpine for healthchecks)
      interval: 10s
      timeout: 5s
      retries: 3

  worker:
    build: .
    entrypoint: ["/worker"]
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }
    environment:
      DATABASE_URL: postgres://app:app@db:5432/links?sslmode=disable
      REDIS_ADDR: redis:6379
    deploy:
      replicas: 1   # Loop 8 will scale this for multi-instance pubsub

volumes:
  dbdata:
