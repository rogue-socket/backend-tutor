<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>backend-dev workspace</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #161922;
    --border: #262a36;
    --text: #d6d8de;
    --muted: #8a8f9c;
    --accent: #7aa2f7;
    --accent-soft: #2a3450;
    --code-bg: #1a1d27;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #fafafa;
      --panel: #ffffff;
      --border: #e3e5ea;
      --text: #1a1d23;
      --muted: #6b7280;
      --accent: #2563eb;
      --accent-soft: #dbeafe;
      --code-bg: #f3f4f6;
    }
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font: 15px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    display: grid;
    grid-template-columns: 280px 1fr;
    grid-template-rows: 100vh;
  }
  aside {
    background: var(--panel);
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 16px;
  }
  aside h1 { font-size: 13px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin: 0 0 8px; }
  aside h2 { font-size: 12px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); margin: 18px 0 6px; }
  aside .meta { font-size: 12px; color: var(--muted); margin-bottom: 12px; }
  aside ul { list-style: none; padding: 0; margin: 0; }
  aside li a {
    display: block;
    padding: 6px 10px;
    border-radius: 6px;
    color: var(--text);
    text-decoration: none;
    font-size: 13px;
  }
  aside li a:hover { background: var(--accent-soft); }
  aside li a.active { background: var(--accent-soft); color: var(--accent); font-weight: 600; }
  aside li a .tags { color: var(--muted); font-size: 11px; margin-left: 6px; }
  main {
    overflow-y: auto;
    padding: 32px 48px;
    max-width: 100%;
  }
  .content { max-width: 760px; }
  .empty {
    color: var(--muted);
    font-size: 14px;
  }
  .empty code {
    background: var(--code-bg);
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 13px;
  }
  .content h1, .content h2, .content h3 { line-height: 1.3; }
  .content h1 { margin-top: 0; }
  .content code {
    background: var(--code-bg);
    padding: 2px 5px;
    border-radius: 4px;
    font-size: 0.9em;
    font-family: "SF Mono", Menlo, Consolas, monospace;
  }
  .content pre {
    background: var(--code-bg);
    padding: 14px 16px;
    border-radius: 8px;
    overflow-x: auto;
    border: 1px solid var(--border);
  }
  .content pre code { background: transparent; padding: 0; font-size: 13px; }
  .content blockquote {
    border-left: 3px solid var(--accent);
    margin: 0;
    padding: 4px 16px;
    color: var(--muted);
  }
  .content table { border-collapse: collapse; }
  .content th, .content td { border: 1px solid var(--border); padding: 6px 10px; }
  .content a { color: var(--accent); }
  .error { color: #f87171; }
</style>
</head>
<body>
<aside>
  <h1>backend-dev</h1>
  <div class="meta" id="meta">loading manifest…</div>
  <div id="nav"></div>
</aside>
<main>
  <div class="content" id="content">
    <p class="empty">Pick a file from the sidebar.</p>
  </div>
</main>

<script type="module">
import { marked } from "https://esm.sh/marked@12";

const ORDER = ["notes", "cheatsheets", "flashcards", "sessions", "reviews", "meta"];

async function load() {
  const meta = document.getElementById("meta");
  let manifest;
  try {
    const res = await fetch("manifest.json", { cache: "no-store" });
    if (!res.ok) throw new Error(`manifest.json: ${res.status}`);
    manifest = await res.json();
  } catch (e) {
    meta.innerHTML = `<span class="error">manifest.json not found.</span><br>Run <code>python3 viewer/regenerate-manifest.py</code> from <code>~/backend-dev/</code>.`;
    return;
  }

  const entries = manifest.entries ?? [];
  meta.textContent = `${entries.length} file${entries.length === 1 ? "" : "s"} · updated ${manifest.generated_at ?? "unknown"}`;

  const byCat = {};
  for (const e of entries) (byCat[e.category] ??= []).push(e);

  const cats = ORDER.filter((c) => byCat[c]).concat(
    Object.keys(byCat).filter((c) => !ORDER.includes(c)).sort()
  );

  const nav = document.getElementById("nav");
  for (const cat of cats) {
    const h2 = document.createElement("h2");
    h2.textContent = cat;
    nav.appendChild(h2);
    const ul = document.createElement("ul");
    for (const e of byCat[cat].sort((a, b) => a.title.localeCompare(b.title))) {
      const li = document.createElement("li");
      const a = document.createElement("a");
      a.href = `#${encodeURIComponent(e.path)}`;
      a.textContent = e.title;
      if (e.tags?.length) {
        const tags = document.createElement("span");
        tags.className = "tags";
        tags.textContent = e.tags.join(", ");
        a.appendChild(tags);
      }
      a.addEventListener("click", (ev) => {
        ev.preventDefault();
        location.hash = encodeURIComponent(e.path);
      });
      li.appendChild(a);
      ul.appendChild(li);
    }
    nav.appendChild(ul);
  }

  async function render() {
    const path = decodeURIComponent(location.hash.slice(1));
    const content = document.getElementById("content");
    document.querySelectorAll("aside a").forEach((a) =>
      a.classList.toggle("active", a.getAttribute("href") === location.hash)
    );
    if (!path) {
      content.innerHTML = `<p class="empty">Pick a file from the sidebar.</p>`;
      return;
    }
    try {
      const res = await fetch(`../${path}`, { cache: "no-store" });
      if (!res.ok) throw new Error(`${path}: ${res.status}`);
      const md = await res.text();
      content.innerHTML = marked.parse(md);
    } catch (e) {
      content.innerHTML = `<p class="error">Failed to load <code>${path}</code>: ${e.message}</p>`;
    }
  }
  window.addEventListener("hashchange", render);
  render();
}
load();
</script>
</body>
</html>
